name: urbix
description: A Flutter application for exploring maps in real life, unlocking achievements, and awarding medals.

version: 1.0.0+1

environment:
  # Dart 3+ — matches the Flutter 3.24+ toolchain that the
  # GitHub Actions CI installs. The previous "<3.0.0" cap was
  # set when the project was on Dart 2.18, but the modern
  # Flutter that CI ships (3.13+ onwards) has Dart 3.x — and
  # share_plus 7.2.2 requires Dart >= 3.2.0. Bumping the lower
  # bound to 3.0.0 keeps the project buildable on the current
  # CI runner; the upper bound stays open so Dart 4 (when it
  # ships) doesn't require a pubspec bump.
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Map Rendering and Geolocation
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # State Management
  provider: ^6.0.0

  # Local persistence for visited geohash cells
  shared_preferences: ^2.2.0

  # System share sheet (iOS UIActivityViewController / Android
  # Intent.ACTION_SEND) so users can post to Instagram, WhatsApp,
  # X, Threads, Telegram etc. without leaving the app.
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  lint: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/img/
    - assets/l10n/


  fonts:
    - family: PixelFont
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf
          weight: 400
   #     - asset: assets/fonts/PressStart2P-Bold.ttf
    #      weight: 700
